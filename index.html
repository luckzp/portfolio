<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — 作品集</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-hover: #1a1a1a;
    --border: #222;
    --border-hover: #444;
    --text-primary: #e8e4df;
    --text-secondary: #8a8580;
    --text-muted: #5a5550;
    --accent: #d4a574;
    --accent-dim: #a07a50;
    --accent-glow: rgba(212, 165, 116, 0.12);
    --tag-bg: rgba(212, 165, 116, 0.08);
    --tag-border: rgba(212, 165, 116, 0.15);
    --radius: 16px;
    --font-display: 'Playfair Display', serif;
    --font-body: 'Noto Sans SC', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain Overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Ambient Glow ── */
  .ambient {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(150px);
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }
  .ambient-1 { top: -200px; left: -100px; background: var(--accent); }
  .ambient-2 { bottom: -300px; right: -200px; background: #7a6a5a; }

  /* ── Layout ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }

  /* ── Navigation ── */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 32px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeDown 0.8s ease both;
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .nav-logo span { color: var(--accent); }
  .nav-contact {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .nav-contact a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.02em;
    transition: color 0.3s;
  }
  .nav-contact a:hover { color: var(--accent); }
  .nav-contact a.nav-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
  }
  .nav-contact a.nav-icon svg {
    width: 20px;
    height: 20px;
  }
  .nav-divider {
    width: 1px;
    height: 14px;
    background: var(--border);
  }

  /* ── Hero ── */
  .hero {
    padding: 56px 0 40px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 40px;
    animation: fadeUp 1s ease 0.2s both;
    border-bottom: 1px solid var(--border);
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(36px, 4.5vw, 56px);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: var(--text-primary);
  }
  .hero-title em {
    font-style: italic;
    color: var(--accent);
  }
  .hero-desc {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-secondary);
    font-weight: 300;
    max-width: 360px;
    text-align: right;
  }

  /* ── Project Grid ── */
  .projects {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    padding: 48px 0;
  }

  .project-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    cursor: pointer;
    transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow: hidden;
    animation: fadeUp 0.8s ease both;
  }
  .project-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: radial-gradient(ellipse at var(--mx, 50%) var(--my, 50%), rgba(212, 165, 116, 0.06), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .project-card:hover::before { opacity: 1; }
  .project-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  /* Card featured variant */
  .project-card.featured {
    grid-column: span 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding: 40px;
  }

  .card-preview {
    width: 100%;
    aspect-ratio: 16 / 10;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .project-card:hover .card-preview img {
    transform: scale(1.04);
  }
  .card-preview .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
    position: relative;
    overflow: hidden;
  }
  .card-preview img + .placeholder {
    position: absolute;
    inset: 0;
    display: none;
    pointer-events: none;
  }
  .card-preview .placeholder.show {
    display: flex;
  }
  .card-preview .placeholder::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(212, 165, 116, 0.02) 8px,
      rgba(212, 165, 116, 0.02) 9px
    );
  }

  .card-content {
    display: flex;
    flex-direction: column;
    gap: 12px;
    justify-content: center;
  }
  .card-index {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.3;
    transition: color 0.3s;
  }
  .project-card:hover .card-title { color: var(--accent); }
  .card-desc {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
    font-weight: 300;
  }
  .card-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .tag {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 100px;
    background: var(--tag-bg);
    border: 1px solid var(--tag-border);
    color: var(--accent-dim);
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .card-date {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }
  .card-arrow {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    color: var(--text-muted);
  }
  .project-card:hover .card-arrow {
    border-color: var(--accent);
    color: var(--accent);
    transform: rotate(-45deg);
  }

  /* ── Section Title ── */
  .section-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }

  /* ── Articles Grid ── */
  .articles-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 16px 0 0;
  }

  .article-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    animation: fadeUp 0.8s ease both;
  }
  .article-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: radial-gradient(ellipse at var(--mx, 50%) var(--my, 50%), rgba(212, 165, 116, 0.06), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .article-card:hover::before { opacity: 1; }
  .article-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .article-title {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 400;
    color: var(--text-primary);
    transition: color 0.3s;
    line-height: 1.4;
  }
  .article-card:hover .article-title {
    color: var(--accent);
  }

  /* ── Footer ── */
  footer {
    padding: 48px 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeUp 0.8s ease 0.6s both;
  }
  .footer-text {
    font-size: 13px;
    color: var(--text-muted);
  }
  .footer-links {
    display: flex;
    gap: 24px;
  }
  .footer-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.3s;
  }
  .footer-links a:hover { color: var(--accent); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .project-card:nth-child(1) { animation-delay: 0.5s; }
  .project-card:nth-child(2) { animation-delay: 0.6s; }
  .project-card:nth-child(3) { animation-delay: 0.7s; }
  .project-card:nth-child(4) { animation-delay: 0.8s; }
  .project-card:nth-child(5) { animation-delay: 0.9s; }
  .project-card:nth-child(6) { animation-delay: 1.0s; }
  .project-card:nth-child(7) { animation-delay: 1.1s; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .container { padding: 0 20px; }
    .hero { flex-direction: column; gap: 16px; align-items: flex-start; padding: 40px 0 32px; }
    .hero-desc { text-align: left; }
    .projects { grid-template-columns: 1fr; }
    .project-card.featured { grid-column: span 1; grid-template-columns: 1fr; }
    .nav-links { gap: 20px; }
    .nav-contact { gap: 12px; flex-wrap: wrap; }
    .articles-grid { grid-template-columns: 1fr; }
    footer { text-align: center; justify-content: center; }
  }
</style>
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<div class="container">

  <!-- Navigation -->
  <nav>
    <div class="nav-logo">FlowWalk<span>.</span></div>
    <div class="nav-contact">
      <a class="nav-icon" href="https://github.com/luckzp" target="_blank" rel="noopener" aria-label="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      </a>
      <a class="nav-icon" href="https://x.com/PENG9620" target="_blank" rel="noopener" aria-label="X">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <span class="nav-divider"></span>
      <a href="mailto:15827343531@163.com">15827343531@163.com</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero" id="about">
    <h1 class="hero-title">Crafting Digital <em>Experiences</em></h1>
    <p class="hero-desc">独立开发者 / 产品设计师。专注于打造美观、实用的数字产品，从构想到上线，全栈实现每一个作品。</p>
  </section>

  <!-- Articles Section -->
  <h2 class="section-title">Articles</h2>
  <div class="articles-grid" id="articles-container"></div>

  <!-- Projects Grid -->
  <h2 class="section-title">Projects</h2>
  <div class="projects" id="projects-container">
    <!-- Project cards will be dynamically inserted here by JavaScript -->
  </div>

  <!-- Footer -->
  <footer>
    <span class="footer-text">© 2026 FlowWalk. 用热爱构建。</span>
  </footer>

</div>

<script>
  // ── Configuration-Driven Product Cards ──
  async function loadProjects() {
    const container = document.getElementById('projects-container');

    try {
      const response = await fetch('projects.json');
      if (!response.ok) throw new Error('Failed to load projects');
      const data = await response.json();

      data.projects.forEach((project, index) => {
        const card = createProjectCard(project, index);
        container.appendChild(card);
      });

      // Render articles
      const articlesContainer = document.getElementById('articles-container');
      if (data.articles) {
        data.articles.forEach((article, index) => {
          const card = createArticleCard(article, index);
          articlesContainer.appendChild(card);
        });
      }

      // Reinitialize effects
      initMouseGlowEffect();
      initScrollObserver();

    } catch (error) {
      console.error('Error loading projects:', error);
      container.innerHTML = '<div class="error-state">加载项目失败</div>';
    }
  }

  function createProjectCard(project, index) {
    const card = document.createElement('a');
    card.href = project.url;
    card.target = '_blank';
    card.className = `project-card${project.featured ? ' featured' : ''}`;
    card.dataset.category = project.category;
    card.style.animationDelay = `${0.5 + (index * 0.1)}s`;

    const previewHtml = project.screenshot
      ? `<img src="${project.screenshot}" alt="${project.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.classList.add('show');">\n        <div class="placeholder" aria-hidden="true">暂无预览</div>`
      : `<div class="placeholder">暂无预览</div>`;
    card.innerHTML = `
      <div class="card-preview">
        ${previewHtml}
      </div>
      <div class="card-content">
        <span class="card-index">${project.index}</span>
        <h3 class="card-title">${project.title} — ${project.subtitle}</h3>
        <p class="card-desc">${project.description}</p>
        <div class="card-tags">
          ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
        </div>
        <div class="card-footer">
          <span class="card-date">${project.date}</span>
          <div class="card-arrow">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 13L13 1M13 1H3M13 1V11"/>
            </svg>
          </div>
        </div>
      </div>
    `;

    return card;
  }

  function createArticleCard(article, index) {
    const card = document.createElement('a');
    card.href = article.url;
    card.target = '_blank';
    card.className = 'article-card';
    card.style.animationDelay = `${0.4 + (index * 0.1)}s`;
    card.innerHTML = `<span class="article-title">${article.title}</span>`;
    return card;
  }

  function initMouseGlowEffect() {
    document.querySelectorAll('.project-card, .article-card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--mx', x + '%');
        card.style.setProperty('--my', y + '%');
      });
    });
  }

  function initScrollObserver() {
    const cards = document.querySelectorAll('.project-card, .article-card');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.animationPlayState = 'running';
        }
      });
    }, { threshold: 0.1 });

    cards.forEach(card => observer.observe(card));
  }

  // Load projects when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadProjects);
  } else {
    loadProjects();
  }
</script>

</body>
</html>
